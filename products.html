<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Catalog Engine | C-STYLE</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script> tailwind.config = { darkMode: 'class' } </script>
  <style> body { font-family: 'Plus Jakarta Sans', sans-serif; } </style>
</head>
<body class="bg-[#FBFBFA] dark:bg-zinc-950 text-black dark:text-white min-h-screen flex flex-col pb-24 md:pb-0 transition-colors">

  <header id="cstyle-global-desktop-header" class="bg-white dark:bg-zinc-900 border-b border-gray-100 dark:border-zinc-800 px-4 md:px-8 py-4 sticky top-0 z-50"></header>

  <main class="flex-grow w-full max-w-7xl mx-auto p-4 md:py-10 space-y-8">
    
    <section class="bg-white dark:bg-zinc-900 border border-gray-100 dark:border-zinc-800 rounded-2xl p-4 flex flex-col md:flex-row items-center justify-between gap-4 shadow-sm">
      <div class="flex items-center space-x-3 w-full md:w-auto">
        <span class="text-xs font-bold text-gray-400 uppercase tracking-widest flex-shrink-0">Filter Cluster:</span>
        <select id="catalog-category-filter" onchange="filterAndRenderMasterCatalog()" class="w-full md:w-44 bg-gray-50 dark:bg-zinc-800 border border-gray-200 dark:border-zinc-700 p-2.5 rounded-xl text-xs font-bold focus:outline-none">
          <option value="ALL">All Grid Inventories</option>
          <option value="Tops">Tops Vault</option>
          <option value="Bottoms">Bottoms Segment</option>
          <option value="Dresses">Luxury Dresses</option>
          <option value="Shoes">Footwear Collections</option>
          <option value="Accessories">Premium Accessories</option>
        </select>
      </div>

      <div class="flex items-center space-x-3 w-full md:w-auto">
        <span class="text-xs font-bold text-gray-400 uppercase tracking-widest flex-shrink-0">Sort Grid:</span>
        <select id="catalog-price-sort" onchange="filterAndRenderMasterCatalog()" class="w-full md:w-44 bg-gray-50 dark:bg-zinc-800 border border-gray-200 dark:border-zinc-700 p-2.5 rounded-xl text-xs font-bold focus:outline-none">
          <option value="DEFAULT">Dynamic Index Sorting</option>
          <option value="LOW_HIGH">Price: Low to High</option>
          <option value="HIGH_LOW">Price: High to Low</option>
        </select>
      </div>
    </section>

    <section id="master-catalog-cards-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6"></section>

  </main>

  <script src="script.js"></script>
  <script>
    // Local memory placeholder cache stream
    let LOCAL_CATALOG_STORE = [];

    async function processLiveCatalogDatabaseStream() {
      const grid = document.getElementById("master-catalog-cards-grid");
      grid.innerHTML = `
        <div class="col-span-full text-center py-20 space-y-2 text-gray-400 animate-pulse font-semibold text-xs uppercase tracking-widest">
          <span>⚡ Establishing Supabase Connection Arrays...</span>
        </div>
      `;

      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/products?select=*`, {
          method: "GET",
          headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
        });
        if (!res.ok) throw new Error("Database Fetch Pipeline Failure");
        
        LOCAL_CATALOG_STORE = await res.json();
        filterAndRenderMasterCatalog();
      } catch (err) {
        grid.innerHTML = `
          <div class="col-span-full text-center py-20 text-red-500 font-bold text-xs uppercase tracking-wider">
            🚨 Core Error: ${err.message}. Ensure tables are synced.
          </div>
        `;
      }
    }

    window.filterAndRenderMasterCatalog = function() {
      const catFilter = document.getElementById("catalog-category-filter").value;
      const priceSort = document.getElementById("catalog-price-sort").value;
      const grid = document.getElementById("master-catalog-cards-grid");

      let compiledProducts = [...LOCAL_CATALOG_STORE];

      // 1. Process Category Sorting Nodes
      if (catFilter !== "ALL") {
        compiledProducts = compiledProducts.filter(p => p.category === catFilter);
      }

      // 2. Process Pricing Metric Vectors
      if (priceSort === "LOW_HIGH") {
        compiledProducts.sort((a, b) => parseFloat(a.price) - parseFloat(b.price));
      } else if (priceSort === "HIGH_LOW") {
        compiledProducts.sort((a, b) => parseFloat(b.price) - parseFloat(a.price));
      }

      if (compiledProducts.length === 0) {
        grid.innerHTML = `
          <div class="col-span-full text-center py-20 text-gray-400 font-bold text-xs uppercase tracking-widest">
            Empty Ledger: No active inventory records maps this filter structure.
          </div>
        `;
        return;
      }

      // 3. Render High-End Cards with Integrated Amazon Review Matrix Blocks
      grid.innerHTML = compiledProducts.map(product => {
        // Mocking premium stable randomized review variables for dynamic generation
        const mockRating = (3.8 + Math.random() * 1.2).toFixed(1);
        const mockReviewCount = Math.floor(45 + Math.random() * 850);
        
        return `
          <div class="bg-white dark:bg-zinc-900 border border-gray-100 dark:border-zinc-800 rounded-[24px] p-3 flex flex-col justify-between group shadow-sm hover:shadow-md transition duration-300">
            <div class="space-y-3">
              <div class="w-full aspect-[3/4] rounded-2xl overflow-hidden bg-gray-50 dark:bg-zinc-800 relative">
                <img src="${product.image || 'https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?w=500'}" class="w-full h-full object-cover group-hover:scale-105 transition duration-500" alt="C-Style Item">
                <span class="absolute top-2.5 left-2.5 bg-black/70 text-white text-[8px] font-bold tracking-widest px-2 py-0.5 rounded-full uppercase">${product.category || 'Luxury'}</span>
              </div>
              <div class="space-y-1 px-1">
                <h4 class="text-xs font-bold text-gray-900 dark:text-white truncate uppercase tracking-tight">${product.title}</h4>
                
                <div class="flex items-center gap-1.5 text-[10px] font-semibold text-gray-400">
                  <div class="bg-emerald-500 text-white text-[9px] px-1.5 py-0.5 rounded-lg flex items-center gap-0.5 font-bold">
                    <span>${mockRating}</span> <span>★</span>
                  </div>
                  <span class="text-gray-400 dark:text-zinc-500 font-medium">(${mockReviewCount} Reviews)</span>
                </div>

                <p class="text-xs font-bold tracking-tight text-black dark:text-white pt-1">$${parseFloat(product.price).toFixed(2)}</p>
              </div>
            </div>

            <div class="pt-3 px-1">
              <button onclick="executeImmediateBagInjection(${product.id}, '${escape(product.title)}', ${product.price}, '${product.image}')" class="w-full bg-black dark:bg-white text-white dark:text-black py-3 rounded-xl text-[10px] font-bold uppercase tracking-widest hover:opacity-90 transition">
                Add to Bag 🛒
              </button>
            </div>
          </div>
        `;
      }).join('');
    };

    window.executeImmediateBagInjection = function(id, title, price, image) {
      let currentCart = JSON.parse(localStorage.getItem("celosia_cart")) || [];
      const itemIndex = currentCart.findIndex(item => item.id === id);

      if (itemIndex > -1) {
        currentCart[itemIndex].quantity += 1;
      } else {
        currentCart.push({ id, title: unescape(title), price: parseFloat(price), image, quantity: 1 });
      }

      localStorage.setItem("celosia_cart", JSON.stringify(currentCart));
      if(window.injectUnifiedNavigationDocks) window.injectUnifiedNavigationDocks();
      if(window.showPremiumToast) window.showPremiumToast("Bag Updated", "Asset node cached locally into secure tracking sheets.", "success");
    };

    window.addEventListener("DOMContentLoaded", () => {
      processLiveCatalogDatabaseStream();
    });
  </script>
</body>
                                              </html>
