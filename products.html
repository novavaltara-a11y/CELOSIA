<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Collections | CELOSIA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#FBFBFA] text-[#1A1A1A] antialiased">

  <div class="bg-black text-white text-[10px] md:text-xs py-2.5 text-center tracking-widest uppercase font-medium">
    FREE SHIPPING ON ORDERS OVER $75 | EASY RETURNS
  </div>

  <nav class="border-b border-gray-200 bg-white sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 md:px-8 h-16 md:h-20 flex items-center justify-between">
      <a href="index.html" class="text-xl md:text-2xl font-bold tracking-widest font-serif">CELOSIA</a>
      <div class="hidden md:flex space-x-8 text-xs uppercase font-semibold tracking-wider text-gray-600">
        <a href="index.html" class="hover:text-black transition">Home</a>
        <a href="products.html" class="text-black font-bold">Collections</a>
        <a href="about.html" class="hover:text-black transition">Our Story</a>
        <a href="admin.html" class="hover:text-black transition">⚙️ Admin</a>
      </div>
      <div class="flex items-center space-x-6">
        <a href="index.html" class="text-xs font-semibold tracking-wider text-gray-500 hover:text-black">← Back Home</a>
        <a href="cart.html" class="text-xl relative">🛍️ <span id="cart-count" class="absolute -top-2 -right-2 bg-black text-white text-[9px] w-4 h-4 rounded-full flex items-center justify-center">0</span></a>
      </div>
    </div>
  </nav>

  <header class="bg-[#F3F3F2] py-12 text-center border-b border-gray-200">
    <h1 class="text-3xl md:text-5xl font-serif font-light tracking-wide uppercase">Our Collection</h1>
    <p class="text-xs text-gray-500 mt-2 tracking-widest uppercase">Live Premium Inventory From Database</p>
  </header>

  <main class="max-w-7xl mx-auto px-4 md:px-8 py-12 grid grid-cols-1 lg:grid-cols-4 gap-8">
    
    <aside class="hidden lg:block space-y-6">
      <div>
        <h4 class="text-xs font-bold uppercase tracking-wider mb-3">Categories</h4>
        <div class="space-y-2 text-xs text-gray-600 font-medium">
          <label class="flex items-center space-x-2 cursor-pointer"><input type="checkbox" checked class="accent-black"> <span>All Products</span></label>
        </div>
      </div>
    </aside>

    <div id="dynamic-product-grid" class="lg:col-span-3 grid grid-cols-2 md:grid-cols-3 gap-4 md:gap-6">
      <div class="col-span-full text-center py-12 text-gray-400 text-xs tracking-widest uppercase animate-pulse">
        Connecting to premium live database...
      </div>
    </div>
  </main>

  <script src="script.js"></script>
  <script>
    // Function to render products beautifully on screen
    function displayLiveProducts(productsList) {
      const gridContainer = document.getElementById("dynamic-product-grid");
      if (!gridContainer) return;

      if (!productsList || productsList.length === 0) {
        gridContainer.innerHTML = `
          <div class="col-span-full text-center py-12 text-gray-500 text-xs tracking-wider">
            No products found in the database. Go to Supabase or Admin Panel to add items!
          </div>`;
        return;
      }

      let dynamicHTML = "";
      productsList.forEach(product => {
        dynamicHTML += `
          <div class="group flex flex-col bg-white p-2 rounded-xl border border-gray-100 shadow-sm">
            <div class="bg-[#F3F3F2] rounded-lg overflow-hidden relative aspect-[3/4]">
              <img src="${product.img || 'https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?q=80&w=400'}" 
                   alt="${product.name}" 
                   class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105">
              <span class="absolute top-3 left-3 bg-black text-white text-[8px] font-bold tracking-widest px-2 py-1 uppercase shadow-sm">
                ${product.category || 'New Season'}
              </span>
            </div>
            <div class="mt-3 flex flex-col flex-grow px-1 pb-1">
              <h3 class="text-xs font-semibold text-gray-800 line-clamp-1">${product.name}</h3>
              <p class="text-xs font-bold text-gray-900 mt-1">$${Number(product.price).toFixed(2)}</p>
              <button onclick="addToCartDirect(${product.id})" class="mt-3 bg-black text-white text-[10px] font-bold uppercase py-2 tracking-wider rounded shadow hover:bg-gray-800 transition">
                Add To Cart
              </button>
            </div>
          </div>
        `;
      });
      gridContainer.innerHTML = dynamicHTML;
    }

    // Helper Cart Function for immediate feedback
    function addToCartDirect(productId) {
      let cart = JSON.parse(localStorage.getItem("celosia_cart")) || [];
      cart.push(productId);
      localStorage.setItem("celosia_cart", JSON.stringify(cart));
      if (typeof updateCartCount === "function") {
        updateCartCount();
      }
      alert("✨ Added to your premium collection cart!");
    }

    // Wait for script.js to load data, then update UI instantly
    document.addEventListener("DOMContentLoaded", () => {
      // If products are already fetched by script.js
      if (typeof PRODUCTS !== 'undefined' && PRODUCTS.length > 0) {
        displayLiveProducts(PRODUCTS);
      }
      
      // Listen to the live sync event from script.js
      document.addEventListener("productsLoaded", (e) => {
        displayLiveProducts(e.detail);
      });
    });
  </script>
</body>
  </html>
