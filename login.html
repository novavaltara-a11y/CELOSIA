<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome to C-STYLE | Authorize Access Token</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style> body { font-family: 'Plus Jakarta Sans', sans-serif; } </style>
</head>
<body class="bg-white text-black min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-md space-y-8 p-6 border border-gray-100 rounded-[32px] shadow-sm text-center">
    <div class="space-y-2">
      <div class="w-12 h-12 rounded-full border-2 border-black flex items-center justify-center mx-auto text-lg font-bold">C</div>
      <h2 id="login-title" class="text-sm font-bold tracking-[0.3em] uppercase">C-STYLE PORTAL LOCK</h2>
      <p class="text-xs text-gray-400 font-medium">Please verify your customer signature sequence to unlock the shop grid arrays.</p>
    </div>

    <form id="gatekeeper-security-form" class="space-y-4 text-left text-xs font-semibold">
      <div>
        <label class="block text-gray-400 uppercase text-[9px] tracking-widest mb-1">Email Coordinates</label>
        <input type="email" id="auth-email" required placeholder="name@domain.com" class="w-full bg-gray-50 border border-gray-100 rounded-xl p-4 focus:outline-none focus:border-black transition-all">
      </div>
      <div>
        <label class="block text-gray-400 uppercase text-[9px] tracking-widest mb-1">Access Key Password</label>
        <input type="password" id="auth-password" required placeholder="••••••••" class="w-full bg-gray-50 border border-gray-100 rounded-xl p-4 focus:outline-none focus:border-black transition-all">
      </div>
      <button type="submit" id="auth-submit-btn" class="w-full bg-black text-white py-4 rounded-xl text-xs font-bold uppercase tracking-widest hover:bg-gray-800 transition">
        Validate & Secure Entry
      </button>
    </form>

    <div class="text-[11px] font-semibold text-gray-400 border-t border-gray-50 pt-4">
      <span id="toggle-text">First time acquiring luxury assets?</span>
      <a href="#" id="toggle-auth-mode-btn" class="text-black font-bold underline ml-1">Create Access Node</a>
    </div>
  </div>

  <script>
    // Embedded inline connection data to bypass chicken-egg bootstrap trap safely
    const SUPABASE_URL = "https://dnnsppyyffpdldacdtcb.supabase.co";
    const SUPABASE_KEY = "sb_publishable_ThipgO2QplsOrnJcgBs_Hg_q6NrhdiD";
    let isRegisterMode = false;

    document.getElementById("toggle-auth-mode-btn").addEventListener("click", (e) => {
      e.preventDefault();
      isRegisterMode = !isRegisterMode;
      document.getElementById("login-title").textContent = isRegisterMode ? "REGISTER ACCESS ACCOUNT" : "C-STYLE PORTAL LOCK";
      document.getElementById("auth-submit-btn").textContent = isRegisterMode ? "Create Verified Node" : "Validate & Secure Entry";
      document.getElementById("toggle-text").textContent = isRegisterMode ? "Already possess security clearance keys?" : "First time acquiring luxury assets?";
      document.getElementById("toggle-auth-mode-btn").textContent = isRegisterMode ? "Sign In Portal" : "Create Access Node";
    });

    document.getElementById("gatekeeper-security-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = document.getElementById("auth-email").value;
      const password = document.getElementById("auth-password").value;
      const endpoint = isRegisterMode ? "signup" : "token?grant_type=password";

      document.getElementById("auth-submit-btn").textContent = "Processing Stream Verification...";

      try {
        const res = await fetch(`${SUPABASE_URL}/auth/v1/${endpoint}`, {
          method: "POST",
          headers: { "apikey": SUPABASE_KEY, "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error_description || data.msg || "Invalid credential chain mappings.");

        if (isRegisterMode) {
          alert("Account Node Created! Please use the Sign In toggle link to clear the gate.");
          window.location.reload();
        } else {
          localStorage.setItem("celosia_user_email", email);
          localStorage.setItem("celosia_user_name", email.split('@')[0].toUpperCase());
          if (email.includes("admin")) localStorage.setItem("celosia_user_role", "admin");
          
          window.location.href = "index.html";
        }
      } catch (err) {
        alert("Security Handshake Refused: " + err.message);
        document.getElementById("auth-submit-btn").textContent = "Validate & Secure Entry";
      }
    });
  </script>
</body>
        </html>
