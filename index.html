<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CELOSIA | Premium Store</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#FBFBFA] text-[#1A1A1A] antialiased">

  <div class="bg-black text-white text-[10px] py-2.5 text-center tracking-widest uppercase font-medium">
    FREE SHIPPING ON ORDERS OVER $75 | EASY RETURNS
  </div>

  <nav class="border-b border-gray-200 bg-white sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 md:px-8 h-16 md:h-20 flex items-center justify-between">
      <a href="index.html" class="text-xl md:text-2xl font-bold tracking-widest font-serif">CELOSIA</a>

      <div class="hidden md:flex space-x-8 text-xs uppercase font-semibold tracking-wider text-gray-600">
        <a href="products.html" class="hover:text-black transition">SHOP ALL</a>
        <a href="about.html" class="hover:text-black transition">OUR STORY</a>
      </div>

      <div class="flex items-center space-x-5">
        <div class="relative">
          <input 
            id="global-search"
            type="text" 
            placeholder="Type & press Enter to Search..." 
            class="bg-[#F3F3F2] text-xs px-5 py-2.5 rounded-full w-48 sm:w-60 focus:outline-none border border-transparent focus:border-gray-300 font-medium"
          />
        </div>
        <a href="login.html" class="text-xl hover:opacity-70 block">👤</a>
        <a href="cart.html" class="text-xl hover:opacity-70 relative block">🛍️ <span id="cart-count" class="absolute -top-1 -right-1 bg-black text-white text-[9px] w-4 h-4 rounded-full flex items-center justify-center font-bold">0</span></a>
      </div>
    </div>
  </nav>

  <header class="bg-[#EAE8E4] py-20 px-4">
    <div class="max-w-4xl mx-auto text-center space-y-6">
      <h1 class="text-5xl md:text-7xl font-serif tracking-tight uppercase">Wear Your <span class="italic font-light">Confidence</span></h1>
      <p class="text-xs md:text-sm text-gray-500 max-w-md mx-auto font-medium">Timeless luxury designs engineered with clean functional interfaces.</p>
      <div class="pt-4"><a href="products.html" class="bg-black text-white px-8 py-4 rounded-full text-xs uppercase tracking-widest font-bold">Explore Catalog</a></div>
    </div>
  </header>

  <section class="max-w-7xl mx-auto px-4 py-16">
    <h2 class="text-lg font-serif uppercase tracking-widest mb-8">Featured Collection</h2>
    <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
      <div class="group flex flex-col">
        <a href="product-detail.html" class="bg-gray-100 rounded-lg overflow-hidden aspect-[3/4] block"><img src="https://images.unsplash.com/photo-1534126511673-b6899657816a?q=80&w=400" class="w-full h-full object-cover"></a>
        <a href="product-detail.html" class="text-xs font-semibold mt-3 hover:underline">Ribbed Knit Top</a>
        <span class="text-xs font-bold text-gray-500 mt-1">$29.90</span>
      </div>
      <div class="group flex flex-col">
        <a href="product-detail.html" class="bg-gray-100 rounded-lg overflow-hidden aspect-[3/4] block"><img src="https://images.unsplash.com/photo-1541099649105-f69ad21f3246?q=80&w=400" class="w-full h-full object-cover"></a>
        <a href="product-detail.html" class="text-xs font-semibold mt-3 hover:underline">Wide-Leg Jeans</a>
        <span class="text-xs font-bold text-gray-500 mt-1">$49.90</span>
      </div>
    </div>
  </section>

  <script src="script.js"></script>
</body>
        </html>
