<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Collections | C-STYLE</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#FBFBFA] text-[#1A1A1A] antialiased">

  <div class="bg-black text-white text-[10px] md:text-xs py-2.5 text-center tracking-widest uppercase font-medium">
    FREE SHIPPING ON ORDERS OVER $75 | EASY RETURNS
  </div>

  <nav class="border-b border-gray-200 bg-white sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 md:px-8 h-16 md:h-20 flex items-center justify-between">
      <a href="index.html" class="text-xl md:text-2xl font-bold tracking-widest font-serif">C-STYLE</a>
      <div class="hidden md:flex space-x-8 text-xs uppercase font-semibold tracking-wider text-gray-600">
        <a href="index.html" class="hover:text-black transition">Home</a>
        <a href="#women" class="text-black font-bold">Women</a>
        <a href="#men" class="hover:text-black transition">Men</a>
        <a href="#shoes" class="hover:text-black transition">Shoes</a>
        <a href="#sale" class="text-red-500 font-bold">Sale</a>
      </div>
      <div class="flex items-center space-x-6">
        <a href="index.html" class="text-xs font-semibold tracking-wider text-gray-500 hover:text-black">← Back Home</a>
        <a href="cart.html" class="text-xl relative">🛍️</a>
      </div>
    </div>
  </nav>

  <header class="bg-[#F3F3F2] py-12 text-center border-b border-gray-200">
    <h1 class="text-3xl md:text-5xl font-serif font-light tracking-wide uppercase">Women's Apparel</h1>
    <p class="text-xs text-gray-500 mt-2 tracking-widest uppercase">Curated International Styles</p>
  </header>

  <main class="max-w-7xl mx-auto px-4 md:px-8 py-12 grid grid-cols-1 lg:grid-cols-4 gap-8">
    
    <aside class="hidden lg:block space-y-6">
      <div>
        <h4 class="text-xs font-bold uppercase tracking-wider mb-3">Categories</h4>
        <div class="space-y-2 text-xs text-gray-600 font-medium">
          <label class="flex items-center space-x-2 cursor-pointer"><input type="checkbox" checked class="accent-black"> <span>Knitwear (12)</span></label>
          <label class="flex items-center space-x-2 cursor-pointer"><input type="checkbox" class="accent-black"> <span>Dresses (24)</span></label>
          <label class="flex items-center space-x-2 cursor-pointer"><input type="checkbox" class="accent-black"> <span>Denim (18)</span></label>
          <label class="flex items-center space-x-2 cursor-pointer"><input type="checkbox" class="accent-black"> <span>Outerwear (8)</span></label>
        </div>
      </div>
      <hr class="border-gray-200">
      <div>
        <h4 class="text-xs font-bold uppercase tracking-wider mb-3">Price Range</h4>
        <div class="space-y-2 text-xs text-gray-600 font-medium">
          <label class="flex items-center space-x-2 cursor-pointer"><input type="radio" name="price" class="accent-black"> <span>Under $30</span></label>
          <label class="flex items-center space-x-2 cursor-pointer"><input type="radio" name="price" class="accent-black"> <span>$30 - $50</span></label>
          <label class="flex items-center space-x-2 cursor-pointer"><input type="radio" name="price" class="accent-black"> <span>Over $50</span></label>
        </div>
      </div>
    </aside>

    <div class="lg:col-span-3 grid grid-cols-2 md:grid-cols-3 gap-4 md:gap-6">
      
      <div class="group flex flex-col">
        <div class="bg-[#F3F3F2] rounded-lg overflow-hidden relative aspect-[3/4]">
          <img src="https://images.unsplash.com/photo-1534126511673-b6899657816a?q=80&w=400" alt="Product" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105">
          <span class="absolute top-3 left-3 bg-white text-[9px] font-bold tracking-widest px-2 py-1 uppercase shadow-sm">Best Seller</span>
        </div>
        <div class="mt-3 flex flex-col flex-grow">
          <h3 class="text-xs font-semibold text-gray-800">Ribbed Knit Top</h3>
          <p class="text-xs font-bold text-gray-900 mt-1">$29.90</p>
          <button class="mt-3 bg-black text-white text-[10px] font-bold uppercase py-2 tracking-wider rounded shadow hover:bg-gray-800 transition">Add To Cart</button>
        </div>
      </div>

      <div class="group flex flex-col">
        <div class="bg-[#F3F3F2] rounded-lg overflow-hidden relative aspect-[3/4]">
          <img src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?q=80&w=400" alt="Product" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105">
        </div>
        <div class="mt-3 flex flex-col flex-grow">
          <h3 class="text-xs font-semibold text-gray-800">Premium Linen Dress</h3>
          <p class="text-xs font-bold text-gray-900 mt-1">$64.00</p>
          <button class="mt-3 bg-black text-white text-[10px] font-bold uppercase py-2 tracking-wider rounded shadow hover:bg-gray-800 transition">Add To Cart</button>
        </div>
      </div>

      <div class="group flex flex-col">
        <div class="bg-[#F3F3F2] rounded-lg overflow-hidden relative aspect-[3/4]">
          <img src="https://images.unsplash.com/photo-1541099649105-f69ad21f3246?q=80&w=400" alt="Product" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105">
        </div>
        <div class="mt-3 flex flex-col flex-grow">
          <h3 class="text-xs font-semibold text-gray-800">Wide-Leg Jeans</h3>
          <p class="text-xs font-bold text-gray-900 mt-1">$49.90</p>
          <button class="mt-3 bg-black text-white text-[10px] font-bold uppercase py-2 tracking-wider rounded shadow hover:bg-gray-800 transition">Add To Cart</button>
        </div>
      </div>

    </div>
  </main>

</body>
      </html>
