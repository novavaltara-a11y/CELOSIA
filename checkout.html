<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secure Checkout | C-STYLE</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#FBFBFA] text-[#1A1A1A] antialiased">

  <header class="border-b border-gray-200 bg-white py-4 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 flex items-center justify-between">
      <span class="text-xl font-bold tracking-widest font-serif">C-STYLE</span>
      <span class="text-[10px] uppercase font-bold tracking-widest text-gray-400 flex items-center">
        🔒 SECURE 256-BIT SSL CHECKOUT
      </span>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-4 py-12 grid md:grid-cols-5 gap-8">
    
    <div class="md:col-span-3 space-y-6">
      <h2 class="text-lg font-bold uppercase tracking-widest font-serif border-b pb-2">1. Shipping Details</h2>
      <form class="space-y-4 text-xs font-semibold" onsubmit="event.preventDefault(); alert('Order Placed Successfully! (Simulated)');">
        <div class="grid grid-cols-2 gap-4">
          <div><label class="block text-gray-500 mb-1">First Name</label><input type="text" required class="w-full bg-white border rounded p-2.5 focus:outline-none focus:border-black"></div>
          <div><label class="block text-gray-500 mb-1">Last Name</label><input type="text" required class="w-full bg-white border rounded p-2.5 focus:outline-none focus:border-black"></div>
        </div>
        <div><label class="block text-gray-500 mb-1">Email Address</label><input type="email" required class="w-full bg-white border rounded p-2.5 focus:outline-none focus:border-black"></div>
        <div><label class="block text-gray-500 mb-1">Street Address</label><input type="text" required class="w-full bg-white border rounded p-2.5 focus:outline-none focus:border-black"></div>
        <div class="grid grid-cols-3 gap-2">
          <div><label class="block text-gray-500 mb-1">City</label><input type="text" required class="w-full bg-white border rounded p-2.5 focus:outline-none focus:border-black"></div>
          <div><label class="block text-gray-500 mb-1">State</label><input type="text" required class="w-full bg-white border rounded p-2.5 focus:outline-none focus:border-black"></div>
          <div><label class="block text-gray-500 mb-1">Postal Code</label><input type="text" required class="w-full bg-white border rounded p-2.5 focus:outline-none focus:border-black"></div>
        </div>
        
        <h2 class="text-lg font-bold uppercase tracking-widest font-serif border-b pb-2 pt-4">2. Payment Simulation</h2>
        <div class="p-4 bg-gray-50 rounded-lg border border-gray-200 text-gray-600 font-medium">
          <p>💳 Credit Card/Debit Card processing terminal active.</p>
          <p class="text-[10px] text-gray-400 mt-1">Safe gateway encryption powered by secure assets.</p>
        </div>

        <button type="submit" class="w-full bg-black text-white text-center text-xs uppercase tracking-widest font-bold py-4 rounded-lg shadow-lg hover:bg-gray-800 transition mt-6">
          Place Secure Order
        </button>
      </form>
    </div>

    <div class="md:col-span-2 space-y-4">
      <div class="bg-white p-4 rounded-xl border border-gray-100 shadow-md">
        <h3 class="text-xs font-bold uppercase tracking-widest mb-3 text-gray-500">Your Order</h3>
        <div class="flex justify-between items-center text-xs font-semibold">
          <span>Ribbed Knit Top (x1)</span>
          <span>$29.90</span>
        </div>
        <hr class="my-3 border-gray-100">
        <div class="flex justify-between items-center font-bold text-sm">
          <span>Total To Pay</span>
          <span class="text-lg text-black">$29.90</span>
        </div>
      </div>
    </div>

  </main>

</body>
  </html>
