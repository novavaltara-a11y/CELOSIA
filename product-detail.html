<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ribbed Knit Top | CELOSIA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#FBFBFA] text-[#1A1A1A] antialiased">

  <nav class="border-b border-gray-200 bg-white sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 md:px-8 h-16 flex items-center justify-between">
      <a href="index.html" class="text-xl font-bold tracking-widest font-serif">CELOSIA</a>
      <div class="flex space-x-6 text-xs uppercase font-semibold tracking-wider text-gray-600">
        <a href="index.html" class="hover:text-black transition">Home</a>
        <a href="products.html" class="hover:text-black transition">Shop All</a>
      </div>
    </div>
  </nav>

  <main class="max-w-6xl mx-auto px-4 py-12 grid md:grid-cols-2 gap-12 items-start">
    
    <div class="bg-gray-100 rounded-xl overflow-hidden aspect-[3/4] shadow-sm">
      <img src="https://images.unsplash.com/photo-1534126511673-b6899657816a?q=80&w=600" alt="Ribbed Knit Top" class="w-full h-full object-cover">
    </div>

    <div class="space-y-6">
      <div>
        <span class="text-[10px] bg-black text-white px-2 py-0.5 rounded uppercase tracking-widest font-bold">New Arrival</span>
        <h1 class="text-3xl font-serif font-bold mt-2 tracking-wide">Ribbed Knit Top</h1>
        <p class="text-xl font-bold mt-2 text-gray-900">$29.90</p>
      </div>

      <p class="text-xs text-gray-500 leading-relaxed font-medium">
        Crafted from our signature premium stretch-knit fabric, this ribbed top features a beautiful contemporary silhouette designed for maximum comfort and effortless day-to-night transitions.
      </p>

      <div class="space-y-2">
        <label class="block text-xs uppercase font-bold tracking-wider text-gray-700">Select Size</label>
        <div class="flex space-x-3 text-xs font-bold">
          <button class="w-10 h-10 border border-gray-300 rounded flex items-center justify-center hover:border-black transition">S</button>
          <button class="w-10 h-10 border border-black rounded flex items-center justify-center bg-black text-white">M</button>
          <button class="w-10 h-10 border border-gray-300 rounded flex items-center justify-center hover:border-black transition">L</button>
          <button class="w-10 h-10 border border-gray-300 rounded flex items-center justify-center hover:border-black transition">XL</button>
        </div>
      </div>

      <div class="pt-4 space-y-3">
        <button onclick="alert('Added to cart securely!');" class="w-full bg-black text-white py-4 rounded-xl text-xs uppercase tracking-widest font-bold shadow-md hover:bg-gray-800 transition">
          Add to Shopping Bag
        </button>
        <a href="products.html" class="block text-center text-xs font-semibold text-gray-500 hover:text-black underline tracking-wide">
          ← Back to Catalog
        </a>
      </div>
    </div>
  </main>

</body>
</html>
