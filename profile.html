<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Profile Dashboard | CELOSIA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#FBFBFA] text-[#1A1A1A] antialiased flex flex-col min-h-screen">

  <nav class="border-b border-gray-200 bg-white sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 md:px-8 h-16 md:h-20 flex items-center justify-between">
      <a href="index.html" class="text-xl md:text-2xl font-bold tracking-widest font-serif">CELOSIA</a>
      <div class="hidden md:flex space-x-8 text-xs uppercase font-semibold tracking-wider text-gray-600">
        <a href="index.html" class="hover:text-black transition">Home</a>
        <a href="products.html" class="hover:text-black transition">Collections</a>
        <a href="profile.html" class="text-black font-bold">My Account</a>
      </div>
      <div class="flex items-center space-x-6">
        <button onclick="handleLogOut()" class="text-xs font-bold uppercase tracking-wider text-red-500 hover:text-red-700 transition">Log Out 🚪</button>
      </div>
    </div>
  </nav>

  <main class="max-w-6xl mx-auto px-4 md:px-8 py-10 flex-grow w-full grid grid-cols-1 md:grid-cols-3 gap-8">
    
    <div class="space-y-6">
      <div class="bg-white border border-gray-100 rounded-2xl p-6 shadow-sm space-y-4">
        <div class="flex items-center space-x-4">
          <div class="w-12 h-12 bg-black text-white rounded-full flex items-center justify-center font-serif text-lg font-bold uppercase" id="user-initial">
            U
          </div>
          <div>
            <h2 class="text-sm font-bold text-gray-800" id="user-email-display">user@domain.com</h2>
            <p class="text-[10px] text-gray-400 font-bold uppercase tracking-wider mt-0.5">Premium Member</p>
          </div>
        </div>
        <div class="border-t border-gray-100 pt-3 text-[11px] text-gray-500 space-y-1 font-medium">
          <div>Client ID: <span class="text-black font-bold" id="client-id">CLS-2026-X</span></div>
          <div>Status: <span class="text-green-600 font-bold">Active Secure Session</span></div>
        </div>
      </div>

      <div class="bg-white border border-gray-100 rounded-2xl p-4 shadow-sm space-y-2 text-xs font-semibold">
        <h3 class="text-[10px] font-bold uppercase tracking-widest text-gray-400 px-2 mb-2">Account Settings</h3>
        <button onclick="alert('Shipping address manager coming soon!');" class="w-full text-left p-2.5 rounded-lg hover:bg-gray-50 transition flex justify-between items-center">
          <span>📍 Manage Addresses</span>
          <span class="text-gray-400">›</span>
        </button>
        <button onclick="alert('Payment options are secure and handled via portal.');" class="w-full text-left p-2.5 rounded-lg hover:bg-gray-50 transition flex justify-between items-center">
          <span>💳 Saved Cards & UPI</span>
          <span class="text-gray-400">›</span>
        </button>
        <button onclick="alert('Notification preferences updated!');" class="w-full text-left p-2.5 rounded-lg hover:bg-gray-50 transition flex justify-between items-center">
          <span>🔔 Notification Preferences</span>
          <span class="text-gray-400">›</span>
        </button>
      </div>
    </div>

    <div class="md:col-span-2 space-y-6">
      <div class="bg-white border border-gray-100 rounded-2xl p-6 shadow-sm space-y-4">
        <h3 class="text-sm font-bold font-serif uppercase tracking-wider text-gray-800 border-b border-gray-100 pb-3">Your Orders & Tracking</h3>
        
        <div id="amazon-order-list" class="space-y-4">
          <p class="text-xs text-gray-400 animate-pulse">Loading order history...</p>
        </div>
      </div>
    </div>

  </main>

  <script src="script.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // Check if user is legally logged in, else kick back to login gateway
      const session = localStorage.getItem("celosia_session");
      const savedEmail = localStorage.getItem("celosia_user_email");

      if (!session || !savedEmail) {
        alert("🔒 Access Denied. Please log in first.");
        window.location.href = "login.html";
        return;
      }

      // Populate user interface fields safely
      document.getElementById("user-email-display").textContent = savedEmail;
      document.getElementById("user-initial").textContent = savedEmail.charAt(0).toUpperCase();
      
      // Generate consistent elegant customer ID based on email string length
      document.getElementById("client-id").textContent = `CLS-2026-${savedEmail.length * 37}`;

      // Call global renderer from script.js to show Amazon-style orders list instantly
      if (typeof renderProfileDashboard === "function") {
        renderProfileDashboard();
      }
    });

    // Handle session termination safely
    function handleLogOut() {
      localStorage.removeItem("celosia_session");
      localStorage.removeItem("celosia_user_email");
      alert("🚪 Logged out successfully from secure server.");
      window.location.href = "login.html";
    }
  </script>
</body>
          </html>
