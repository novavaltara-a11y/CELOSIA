<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>C-STYLE | Security Node Gateway</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style> body { font-family: 'Plus Jakarta Sans', sans-serif; letter-spacing: -0.01em; } </style>
</head>
<body class="bg-white text-black min-h-screen flex flex-col justify-between p-6">

  <div class="w-full flex justify-center pt-8">
    <div class="flex flex-col items-center space-y-3">
      <div class="relative w-14 h-14 flex items-center justify-center">
        <span class="absolute inset-0 border border-gray-100 rounded-full animate-spin-[20s]"></span>
        <span class="absolute inset-1.5 border border-black rounded-full"></span>
        <span class="text-xs font-bold tracking-tighter">C</span>
      </div>
      <div class="text-center">
        <h1 class="text-xs font-bold tracking-[0.4em] uppercase text-black">C-STYLE</h1>
        <span class="text-[8px] tracking-[0.25em] text-gray-400 font-bold uppercase block mt-1">Digital Vault Layer</span>
      </div>
    </div>
  </div>

  <div class="w-full max-w-sm mx-auto my-auto space-y-6 pt-12">
    <div class="text-center space-y-1">
      <h2 id="login-title" class="text-xs font-bold tracking-[0.25em] uppercase text-black">SIGN IN VERIFICATION</h2>
      <p class="text-[10px] text-gray-400 font-medium">Provide encrypted account details to access global repositories.</p>
    </div>

    <form id="gatekeeper-security-form" class="space-y-4 text-left text-[10px] font-bold text-gray-400 tracking-wider uppercase">
      <div>
        <label class="block mb-1">Email Coordinates</label>
        <input type="email" id="auth-email" required placeholder="customer@cstyle.com" class="w-full bg-white border border-gray-200 text-black p-4 rounded-xl font-medium text-xs normal-case focus:outline-none focus:border-black transition-all">
      </div>
      <div>
        <label class="block mb-1">Vault Password</label>
        <input type="password" id="auth-password" required placeholder="••••••••" class="w-full bg-white border border-gray-200 text-black p-4 rounded-xl font-medium text-xs normal-case focus:outline-none focus:border-black transition-all">
      </div>
      <button type="submit" id="auth-submit-btn" class="w-full bg-black text-white py-4 rounded-xl text-[10px] font-bold uppercase tracking-widest hover:bg-zinc-900 transition shadow-sm mt-2">
        Access Account Dashboard
      </button>
    </form>

    <div class="text-center text-[10px] font-bold text-gray-400 tracking-wide pt-2">
      <span id="toggle-text">First time acquiring assets?</span>
      <a href="#" id="toggle-auth-mode-btn" class="text-black underline ml-1 font-bold">Create Access Key</a>
    </div>
  </div>

  <div class="w-full text-center pb-4">
    <span class="text-[9px] font-bold tracking-[0.2em] text-gray-300 uppercase">SECURE SHELL HARDWARE ENCRYPTED © 2026</span>
  </div>

  <script>
    const SUPABASE_URL = "https://dnnsppyyffpdldacdtcb.supabase.co";
    const SUPABASE_KEY = "sb_publishable_ThipgO2QplsOrnJcgBs_Hg_q6NrhdiD";
    let isRegisterMode = false;

    document.getElementById("toggle-auth-mode-btn").addEventListener("click", (e) => {
      e.preventDefault();
      isRegisterMode = !isRegisterMode;
      document.getElementById("login-title").textContent = isRegisterMode ? "REGISTER DATA NODES" : "SIGN IN VERIFICATION";
      document.getElementById("auth-submit-btn").textContent = isRegisterMode ? "Generate Verified Access Token" : "Access Account Dashboard";
      document.getElementById("toggle-text").textContent = isRegisterMode ? "Possess valid clear keys?" : "First time acquiring assets?";
      document.getElementById("toggle-auth-mode-btn").textContent = isRegisterMode ? "Sign In Portal" : "Create Access Key";
    });

    document.getElementById("gatekeeper-security-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = document.getElementById("auth-email").value;
      const password = document.getElementById("auth-password").value;
      const endpoint = isRegisterMode ? "signup" : "token?grant_type=password";

      document.getElementById("auth-submit-btn").textContent = "SYNCHRONIZING STREAM...";

      try {
        const res = await fetch(`${SUPABASE_URL}/auth/v1/${endpoint}`, {
          method: "POST",
          headers: { "apikey": SUPABASE_KEY, "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error_description || data.msg || "Authentication exception mapping failed.");

        if (isRegisterMode) {
          alert("Secure Access Coordinates Created! Use the toggle to sign in.");
          window.location.reload();
        } else {
          // Robust storage token setting to stop duplicate authorization cycles
          localStorage.setItem("celosia_user_email", email);
          localStorage.setItem("celosia_user_name", email.split('@')[0].toUpperCase());
          if (email.includes("admin")) localStorage.setItem("celosia_user_role", "admin");
          
          window.location.href = "index.html";
        }
      } catch (err) {
        alert("Access Denied: " + err.message);
        document.getElementById("auth-submit-btn").textContent = "Access Account Dashboard";
      }
    });
  </script>
</body>
  </html>
