<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secure Checkout | CELOSIA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#F4F4F3] text-[#1A1A1A] antialiased">

  <nav class="border-b bg-white p-4 flex justify-between items-center">
    <a href="index.html" class="text-lg font-bold font-serif tracking-widest">CELOSIA</a>
    <span class="text-[10px] uppercase font-bold tracking-widest text-gray-400">🔒 256-Bit SSL Encryption</span>
  </nav>

  <main class="max-w-5xl mx-auto px-4 py-10 grid lg:grid-cols-3 gap-8">
    
    <div class="lg:col-span-2 space-y-6">
      
      <div class="bg-white p-6 rounded-xl border shadow-sm space-y-4">
        <h3 class="text-xs font-bold uppercase tracking-wider text-gray-500 border-b pb-2">1. Delivery Address</h3>
        <div class="grid grid-cols-2 gap-4 text-xs font-semibold">
          <div class="col-span-2">
            <label class="text-gray-400 block mb-1">Full Name</label>
            <input type="text" placeholder="John Doe" class="w-full bg-gray-50 p-3 border rounded-lg focus:outline-none focus:border-black font-medium">
          </div>
          <div>
            <label class="text-gray-400 block mb-1">Phone Number</label>
            <input type="text" placeholder="+123456789" class="w-full bg-gray-50 p-3 border rounded-lg focus:outline-none focus:border-black font-medium">
          </div>
          <div>
            <label class="text-gray-400 block mb-1">Postal Code</label>
            <input type="text" placeholder="10001" class="w-full bg-gray-50 p-3 border rounded-lg focus:outline-none focus:border-black font-medium">
          </div>
          <div class="col-span-2">
            <label class="text-gray-400 block mb-1">Street Address</label>
            <input type="text" placeholder="Apartment, suite, unit, building" class="w-full bg-gray-50 p-3 border rounded-lg focus:outline-none focus:border-black font-medium">
          </div>
        </div>
      </div>

      <div class="bg-white p-6 rounded-xl border shadow-sm space-y-4">
        <h3 class="text-xs font-bold uppercase tracking-wider text-gray-500 border-b pb-2">2. Payment Method</h3>
        <div class="space-y-3 text-xs font-bold">
          <label class="flex items-center space-x-3 p-3 bg-gray-50 rounded-lg border border-black cursor-pointer">
            <input type="radio" name="payment" checked class="accent-black">
            <span>💳 Credit / Debit Card</span>
          </label>
          <label class="flex items-center space-x-3 p-3 bg-gray-50 rounded-lg border border-transparent hover:border-gray-200 cursor-pointer">
            <input type="radio" name="payment" class="accent-black">
            <span>💵 Cash On Delivery (COD) / UPI Gateway</span>
          </label>
        </div>
      </div>

    </div>

    <div class="space-y-4">
      <div class="bg-white p-6 rounded-xl border shadow-sm space-y-4">
        <h3 class="text-xs font-bold uppercase tracking-wider text-gray-500 border-b pb-2">Order Summary</h3>
        
        <div class="space-y-2 text-xs font-semibold text-gray-500">
          <div class="flex justify-between"><span>Items Subtotal:</span><span class="text-black font-bold">$29.90</span></div>
          <div class="flex justify-between"><span>Shipping & Handling:</span><span class="text-green-600 font-bold">FREE</span></div>
          <div class="h-[1px] bg-gray-100 my-2"></div>
          <div class="flex justify-between text-sm text-black font-bold"><span>Order Total:</span><span>$29.90</span></div>
        </div>

        <button onclick="window.location.href='success.html';" class="w-full bg-black text-white py-4 rounded-xl text-xs uppercase tracking-widest font-bold shadow-lg hover:bg-gray-800 transition text-center block mt-4">
          Place Secure Order
        </button>
      </div>
    </div>

  </main>

</body>
      </html>
