<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Selected Archive Bag | C-STYLE</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; letter-spacing: -0.01em; }
  </style>
</head>
<body class="bg-[#FAFAFA] text-[#111111] antialiased min-h-screen flex flex-col pb-20 md:pb-0">

  <header class="bg-white border-b border-gray-100 sticky top-0 z-50 px-4 py-4">
    <div class="max-w-7xl mx-auto flex items-center justify-between">
      <a href="index.html" class="text-xs font-bold uppercase tracking-wider text-gray-400 hover:text-black flex items-center space-x-1">
        <span>&larr;</span> <span>Back Store</span>
      </a>
      <span class="text-xs font-bold tracking-[0.25em] uppercase">MY STORAGE BAG SYSTEM</span>
      <div class="flex items-center text-xs">
        <a href="profile.html">👤 Account Profile</a>
      </div>
    </div>
  </header>

  <main class="flex-grow w-full max-w-7xl mx-auto p-4 md:py-8 grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
    
    <section class="lg:col-span-8 space-y-4">
      <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest border-b border-gray-50 pb-1.5">Active Bag Ledger</h3>
      <div id="cart-workspace-items-canvas" class="space-y-4">
        <p class="text-xs text-gray-400 animate-pulse py-6 font-medium">Processing storage models tracking matrix...</p>
      </div>
    </section>

    <section class="lg:col-span-4 bg-white border border-gray-100 rounded-3xl p-6 shadow-sm space-y-4">
      <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest border-b border-gray-50 pb-1.5">Settlement Metrics Summary</h3>
      
      <div class="space-y-3 text-xs font-semibold">
        <div class="flex justify-between text-gray-400">
          <span>Items Collective Subtotal</span>
          <span id="invoice-subtotal" class="text-gray-900 font-bold">$0.00</span>
        </div>
        <div class="flex justify-between text-gray-400 border-b border-gray-50 pb-3">
          <span>Logistics Routing Transport</span>
          <span class="text-green-600 font-bold">Complimentary</span>
        </div>
        <div class="flex justify-between text-sm font-bold text-gray-900 pt-1">
          <span>Total Asset Liability</span>
          <span id="invoice-total">$0.00</span>
        </div>
      </div>

      <button onclick="routeToSecureCheckout()" class="w-full bg-black text-white py-4 rounded-xl text-xs font-bold uppercase tracking-widest hover:bg-gray-800 transition shadow-lg block text-center">
        Proceed to Secure Checkout Suite
      </button>
    </section>

  </main>

  <div class="md:hidden fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md border-t border-gray-100 h-20 px-6 flex items-center justify-between z-50 rounded-t-3xl shadow-2xl">
    <a href="index.html" class="flex flex-col items-center justify-center text-gray-400">
      <span class="text-xl">🏠</span><span class="text-[9px] font-bold tracking-widest uppercase mt-1">Home</span>
    </a>
    <a href="products.html" class="flex flex-col items-center justify-center text-gray-400">
      <span class="text-xl">🔍</span><span class="text-[9px] font-bold tracking-widest uppercase mt-1">Search</span>
    </a>
    <a href="cart.html" class="flex flex-col items-center justify-center text-black relative">
      <span class="text-xl">🛒</span><span class="global-cart-count absolute top-0 right-1 bg-black text-white text-[8px] w-3.5 h-3.5 rounded-full flex items-center justify-center font-bold hidden">0</span>
      <span class="text-[9px] font-bold tracking-widest uppercase mt-1">Cart</span>
    </a>
    <a href="profile.html" class="flex flex-col items-center justify-center text-gray-400">
      <span class="text-xl">👤</span><span class="text-[9px] font-bold tracking-widest uppercase mt-1">Profile</span>
    </a>
  </div>

  <script src="script.js"></script>
  <script>
    function compilePremiumTrolleyCanvas() {
      const items = JSON.parse(localStorage.getItem("celosia_cart")) || [];
      const canvas = document.getElementById("cart-workspace-items-canvas");
      
      if(items.length === 0) {
        canvas.innerHTML = `
          <div class="bg-white border border-gray-100 rounded-3xl p-8 text-center space-y-4">
            <span class="text-3xl block">🛒</span>
            <p class="text-xs text-gray-400 font-semibold">Your asset bag archive is empty inside local cache nodes.</p>
            <a href="products.html" class="inline-block bg-black text-white text-[10px] uppercase font-bold tracking-widest px-6 py-3 rounded-xl shadow">Explore Active Catalog</a>
          </div>
        `;
        document.getElementById("invoice-subtotal").textContent = "$0.00";
        document.getElementById("invoice-total").textContent = "$0.00";
        return;
      }

      let dynamicAggregatedPrice = 0;
      canvas.innerHTML = items.map((item, index) => {
        const subtotalLiability = parseFloat(item.price) * parseInt(item.quantity || 1);
        dynamicAggregatedPrice += subtotalLiability;

        return `
          <div class="bg-white border border-gray-100 rounded-2xl p-4 flex items-center justify-between gap-4 shadow-sm">
            <div class="flex items-center space-x-4">
              <div class="w-14 h-18 bg-gray-50 border border-gray-100 rounded-xl overflow-hidden flex-shrink-0">
                <img src="${item.image_url}" class="w-full h-full object-cover">
              </div>
              <div>
                <h4 class="text-xs font-bold text-gray-800 uppercase tracking-tight">${item.name}</h4>
                <p class="text-xs font-bold text-gray-400 mt-0.5">$${parseFloat(item.price).toFixed(2)}</p>
              </div>
            </div>

            <div class="flex items-center space-x-6">
              <div class="flex items-center border border-gray-100 rounded-xl bg-gray-50 overflow-hidden text-xs font-bold">
                <button onclick="alterAssetQuantity(${index}, -1)" class="px-3 py-1.5 hover:bg-gray-100 font-bold text-gray-500 transition">-</button>
                <span class="px-1 text-gray-800">${item.quantity || 1}</span>
                <button onclick="alterAssetQuantity(${index}, 1)" class="px-3 py-1.5 hover:bg-gray-100 font-bold text-gray-500 transition">+</button>
              </div>
              <button onclick="wipeCartAssetNode(${index})" class="text-xs font-bold text-red-400 hover:text-red-500 transition">✕</button>
            </div>
          </div>
        `;
      }).join('');

      document.getElementById("invoice-subtotal").textContent = `$${dynamicAggregatedPrice.toFixed(2)}`;
      document.getElementById("invoice-total").textContent = `$${dynamicAggregatedPrice.toFixed(2)}`;
      if(window.syncGlobalHeaderCounters) window.syncGlobalHeaderCounters();
    }

    window.alterAssetQuantity = function(index, modifier) {
      let items = JSON.parse(localStorage.getItem("celosia_cart")) || [];
      if(!items[index]) return;

      items[index].quantity = (items[index].quantity || 1) + modifier;
      if(items[index].quantity <= 0) { items.splice(index, 1); }
      
      localStorage.setItem("celosia_cart", JSON.stringify(items));
      compilePremiumTrolleyCanvas();
    };

    window.wipeCartAssetNode = function(index) {
      let items = JSON.parse(localStorage.getItem("celosia_cart")) || [];
      items.splice(index, 1);
      localStorage.setItem("celosia_cart", JSON.stringify(items));
      compilePremiumTrolleyCanvas();
      window.showPremiumToast("Item Evicted", "Successfully cleared structural item allocation from storage.", "info");
    };

    window.routeToSecureCheckout = function() {
      if(!localStorage.getItem("celosia_user_email")) {
        window.showPremiumToast("Authentication Needed", "Please log into your account portal to authorize shipping manifest creation.", "error");
        setTimeout(() => window.location.href = "profile.html", 1500);
      } else {
        window.location.href = "checkout.html";
      }
    };

    window.addEventListener("DOMContentLoaded", () => {
      compilePremiumTrolleyCanvas();
    });
  </script>
</body>
  </html>
