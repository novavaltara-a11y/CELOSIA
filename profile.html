<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account Matrix | CELOSIA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    .luxury-title { font-family: 'Cormorant Garamond', serif; }
    
    .fade-in-luxury {
      animation: luxurySmoothView 1s cubic-bezier(0.25, 1, 0.5, 1) forwards;
    }
    @keyframes luxurySmoothView {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
  <script>
    // Direct Security Route Guard
    if(!localStorage.getItem("celosia_user_email")) { window.location.replace("index.html"); }
  </script>
</head>
<body class="bg-[#FBFBFA] text-[#1A1A1A] antialiased flex flex-col min-h-screen pb-24 md:pb-0">

  <nav class="border-b border-gray-100 bg-white/80 backdrop-blur-md sticky top-0 z-50 px-4 py-4 md:py-6">
    <div class="max-w-7xl mx-auto flex items-center justify-between">
      <button onclick="window.location.href='index.html'" class="text-xs font-bold uppercase tracking-wider text-gray-400 hover:text-black flex items-center space-x-1">
        <span>←</span> <span>Return to House</span>
      </button>
      <span class="text-xl font-bold tracking-widest luxury-title uppercase">ACCOUNT IDENTITY</span>
      <div class="w-10"></div>
    </div>
  </nav>

  <main class="max-w-md mx-auto px-4 py-12 flex-grow w-full space-y-8 fade-in-luxury">
    
    <div class="bg-white border border-gray-100 rounded-3xl p-8 shadow-[0_20px_50px_rgba(0,0,0,0.02)] space-y-6 relative overflow-hidden">
      <div class="absolute w-32 h-32 rounded-full bg-gray-50 -top-10 -right-10 blur-xl opacity-80"></div>
      
      <div class="space-y-2 relative z-10">
        <span class="text-[9px] font-bold uppercase tracking-[0.3em] text-gray-400 block">Authorized Identity Token</span>
        <h3 id="profile-identity-display" class="text-lg font-bold text-gray-900 tracking-wide truncate">Loading parameters...</h3>
        <p class="text-[10px] text-gray-400 font-semibold uppercase tracking-wider">Access Node Clear: <span class="text-green-600 font-bold">Validated ✓</span></p>
      </div>

      <div class="w-full h-[1px] bg-gray-50"></div>

      <div class="space-y-3 text-xs font-semibold">
        <a href="orders-tracker.html" class="flex justify-between items-center bg-gray-50 hover:bg-gray-100/70 p-4 rounded-xl transition group">
          <span class="text-gray-600">Review Logistic Manifests</span>
          <span class="text-gray-400 group-hover:text-black transition">📦 →</span>
        </a>
        <a href="cart.html" class="flex justify-between items-center bg-gray-50 hover:bg-gray-100/70 p-4 rounded-xl transition group">
          <span class="text-gray-600">Inspect Active Allocation Bag</span>
          <span class="text-gray-400 group-hover:text-black transition">🛒 →</span>
        </a>
        <button id="profile-admin-shortcut" onclick="window.location.href='admin.html'" class="hidden w-full text-left justify-between items-center bg-amber-50/50 hover:bg-amber-50 p-4 rounded-xl border border-amber-100/60 transition group text-amber-800">
          <span>Launch Administrative Inventory Console</span>
          <span class="text-amber-500">⚙️</span>
        </button>
      </div>

      <div class="pt-4">
        <button onclick="triggerProfileGlobalLogout()" class="w-full bg-red-50 hover:bg-red-100/80 text-red-500 py-3.5 rounded-xl text-[10px] uppercase tracking-[0.2em] font-bold transition duration-300 shadow-sm border border-red-100/40">
          Terminate Session Keys 🚪
        </button>
      </div>
    </div>

  </main>

  <div class="md:hidden fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t border-gray-100 h-20 px-6 flex items-center justify-between z-50 shadow-2xl rounded-t-2xl">
    <a href="index.html" class="flex flex-col items-center justify-center text-gray-400">
      <span class="text-lg">🏠</span><span class="text-[9px] font-bold tracking-widest uppercase mt-1">Home</span>
    </a>
    <a href="products.html" class="flex flex-col items-center justify-center text-gray-400">
      <span class="text-lg">🔍</span><span class="text-[9px] font-bold tracking-widest uppercase mt-1">Search</span>
    </a>
    <a href="cart.html" class="flex flex-col items-center justify-center text-gray-400">
      <span class="text-lg">🛒</span><span class="text-[9px] font-bold tracking-widest uppercase mt-1">Cart</span>
    </a>
    <a href="orders-tracker.html" class="flex flex-col items-center justify-center text-gray-400">
      <span class="text-lg">📦</span><span class="text-[9px] font-bold tracking-widest uppercase mt-1">Orders</span>
    </a>
    <a href="profile.html" class="flex flex-col items-center justify-center text-black">
      <span class="text-lg">👤</span><span class="text-[9px] font-bold tracking-widest uppercase mt-1">Profile</span>
    </a>
  </div>

  <script src="script.js"></script>
  <script>
    // Hydrate Client Identity Parameters from Session Data Cache
    function renderProfileMatrixParameters() {
      const targetDisplay = document.getElementById("profile-identity-display");
      const sessionUserEmail = localStorage.getItem("celosia_user_email");
      const sessionUserRole = localStorage.getItem("celosia_user_role");

      if(sessionUserEmail) {
        targetDisplay.textContent = sessionUserEmail;
        
        // Expose admin control access nodes if condition metrics pass
        if(sessionUserEmail.includes("admin") || sessionUserRole === "admin") {
          const adminNodeShortcut = document.getElementById("profile-admin-shortcut");
          if(adminNodeShortcut) {
            adminNodeShortcut.classList.remove("hidden");
            adminNodeShortcut.classList.add("flex");
          }
        }
      } else {
        window.location.replace("index.html");
      }
    }

    // Flush and reset token matrices completely from framework layers
    function triggerProfileGlobalLogout() {
      localStorage.clear();
      window.location.replace("index.html");
    }

    window.addEventListener("DOMContentLoaded", renderProfileMatrixParameters);
  </script>
</body>
  </html>
