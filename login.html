<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account Gateway | CELOSIA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#FBFBFA] text-[#1A1A1A] antialiased flex flex-col min-h-screen">

  <nav class="border-b border-gray-200 bg-white px-4 py-4 flex justify-between items-center">
    <a href="index.html" class="text-lg font-bold tracking-widest font-serif">CELOSIA</a>
    <div class="flex space-x-4 text-xs font-bold uppercase text-gray-500">
      <a href="index.html" class="hover:text-black">Home</a>
    </div>
  </nav>

  <main class="flex-grow flex items-center justify-center px-4 py-12">
    <div class="bg-white max-w-md w-full p-8 rounded-2xl border border-gray-100 shadow-xl space-y-6">
      
      <div class="text-center space-y-1">
        <h2 id="auth-title" class="text-xl font-bold font-serif uppercase tracking-wide">Welcome to CELOSIA</h2>
        <p id="auth-subtitle" class="text-xs text-gray-400 font-medium">Sign in to manage your premium fashion profile.</p>
      </div>

      <form id="auth-form" class="space-y-4 text-xs font-semibold">
        <div>
          <label class="block text-gray-500 mb-1">Email Address</label>
          <input type="email" id="auth-email" placeholder="name@domain.com" required class="w-full bg-gray-50 border rounded-lg p-3 focus:outline-none focus:border-black font-medium">
        </div>
        <div>
          <label class="block text-gray-500 mb-1">Password</label>
          <input type="password" id="auth-password" placeholder="••••••••" required class="w-full bg-gray-50 border rounded-lg p-3 focus:outline-none focus:border-black font-medium">
        </div>

        <button type="submit" id="submit-btn" class="w-full bg-black text-white text-center py-3.5 rounded-lg text-[11px] uppercase tracking-widest font-bold shadow-md hover:bg-gray-800 transition">
          Sign In
        </button>
      </form>

      <div class="flex items-center my-4 select-none">
        <div class="flex-grow border-t border-gray-200"></div>
        <span class="mx-3 text-[10px] text-gray-400 font-bold uppercase tracking-wider">or</span>
        <div class="flex-grow border-t border-gray-200"></div>
      </div>

      <button type="button" onclick="console.log('Google Portal Ready');" class="w-full bg-white border border-gray-300 text-gray-700 py-3 rounded-lg text-xs font-bold shadow-sm hover:bg-gray-50 transition flex items-center justify-center space-x-2">
        <img src="https://www.gstatic.com/images/branding/product/1x/gsa_android_loupe_72dp.png" alt="Google Logo" class="w-4 h-4 object-contain">
        <span>Continue with Google</span>
      </button>

      <div class="border-t pt-4 text-center text-xs font-medium text-gray-400">
        <span id="toggle-text">Don't have an account?</span> 
        <a href="#" id="toggle-auth-mode" class="text-black font-bold underline">Create profile</a>
      </div>

    </div>
  </main>

  <script src="script.js"></script>
  
  <script>
    // BACK-BUTTON FIX & AUTO REDIRECT (No Alerts)
    document.addEventListener("DOMContentLoaded", () => {
      const session = localStorage.getItem("celosia_session");
      const savedEmail = localStorage.getItem("celosia_user_email");
      if (session && savedEmail) {
        window.location.replace("profile.html");
      }
    });

    let isSignUpMode = false;
    const authForm = document.getElementById("auth-form");
    const authTitle = document.getElementById("auth-title");
    const authSubtitle = document.getElementById("auth-subtitle");
    const submitBtn = document.getElementById("submit-btn");
    const toggleAuthMode = document.getElementById("toggle-auth-mode");
    const toggleText = document.getElementById("toggle-text");

    toggleAuthMode.addEventListener("click", (e) => {
      e.preventDefault();
      isSignUpMode = !isSignUpMode;
      
      if (isSignUpMode) {
        authTitle.textContent = "Create Profile";
        authSubtitle.textContent = "Join our exclusive collection matrix.";
        submitBtn.textContent = "Register Account";
        toggleText.textContent = "Already have a profile?";
        toggleAuthMode.textContent = "Sign In";
      } else {
        authTitle.textContent = "Welcome to CELOSIA";
        authSubtitle.textContent = "Sign in to manage your premium fashion profile.";
        submitBtn.textContent = "Sign In";
        toggleText.textContent = "Don't have an account?";
        toggleAuthMode.textContent = "Create profile";
      }
    });

    authForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      
      const email = document.getElementById("auth-email").value;
      const password = document.getElementById("auth-password").value;
      const endpoint = isSignUpMode ? "signup" : "token?grant_type=password";
      
      submitBtn.textContent = "Verifying...";
      submitBtn.disabled = true;

      try {
        const response = await fetch(`${SUPABASE_URL}/auth/v1/${endpoint}`, {
          method: "POST",
          headers: {
            "apikey": SUPABASE_KEY,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error_description || data.msg || "Authentication Failed");
        }

        if (isSignUpMode) {
          // Signup success: Automatically switch to login mode silently without alert
          isSignUpMode = false;
          authTitle.textContent = "Welcome to CELOSIA";
          authSubtitle.textContent = "Sign in to manage your premium fashion profile.";
          submitBtn.textContent = "Sign In";
          toggleText.textContent = "Don't have an account?";
          toggleAuthMode.textContent = "Create profile";
          
          // Clear password for safety, keep email filled for convenience
          document.getElementById("auth-password").value = "";
        } else {
          // Signin success: Save credentials and direct seamless redirect
          localStorage.setItem("celosia_session", JSON.stringify(data));
          localStorage.setItem("celosia_user_email", email);
          
          if (data.user && data.user.user_metadata && data.user.user_metadata.role === "admin") {
            localStorage.setItem("celosia_user_role", "admin");
          } else {
            localStorage.removeItem("celosia_user_role");
          }
          
          window.location.href = "profile.html"; 
        }

      } catch (error) {
        // Only show alert if there is a real system failure or wrong credentials
        alert("⚠️ System Alert: " + error.message);
      } finally {
        submitBtn.textContent = isSignUpMode ? "Register Account" : "Sign In";
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
    </html>
